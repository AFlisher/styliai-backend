openapi: 3.0.3
info:
  title: StyliAI API
  version: "1.0.0"
  description: >
    Hand-authored OpenAPI contract for the StyliAI backend, written directly
    from the actual controller/model source (not aspirational) as the single
    source of truth for client-side type generation. Endpoints that don't
    exist yet (e.g. POST /api/styles/preview, called by the dashboard's
    dormant Prompt Preview UI) are intentionally NOT documented here - this
    spec describes what the API actually does today.
servers:
  - url: https://styliai-backend-production.up.railway.app
  - url: http://localhost:3000

components:
  securitySchemes:
    userBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Regular user JWT, signed with SUPABASE_JWT_SECRET.
    adminBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Admin JWT, signed with ADMIN_JWT_SECRET, requires role=admin.

  schemas:
    ErrorMessage:
      type: object
      properties:
        message:
          type: string
      required: [message]

    ErrorCode:
      type: object
      description: Structured error shape used by generateController.js and walletController.js (Roadmap Item 2.1). Other controllers still use ErrorMessage.
      properties:
        code:
          type: string
          example: INSUFFICIENT_BALANCE
        message:
          type: string
      required: [code, message]

    UserAuthUser:
      type: object
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        fullName: { type: string }
        emailConfirmedAt: { type: string, format: date-time, nullable: true }
      required: [id, email, fullName]

    UserAuthResponse:
      type: object
      properties:
        accessToken: { type: string }
        refreshToken: { type: string }
        user: { $ref: '#/components/schemas/UserAuthUser' }
      required: [accessToken, refreshToken, user]

    AdminUser:
      type: object
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        fullName: { type: string }
        role: { type: string, enum: [admin] }
      required: [id, email, fullName, role]

    AdminAuthResponse:
      type: object
      description: Admin login has no refresh token today (Roadmap Item 2.4b notes this as a fixed 12h session with no rotation).
      properties:
        accessToken: { type: string }
        user: { $ref: '#/components/schemas/AdminUser' }
      required: [accessToken, user]

    Category:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        sortOrder: { type: integer }
        isEnabled: { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required: [id, name, sortOrder, isEnabled]

    Style:
      type: object
      description: >
        Admin-shaped Style (includes prompt/negativePrompt/tagIds). Non-admin
        callers (the mobile app) get an allowlisted subset with prompt,
        negativePrompt and tagIds omitted entirely - tags are internal
        ranking metadata, never exposed to end users - see styleModel.getPublicStyles.
      properties:
        id: { type: string, format: uuid }
        categoryId: { type: string, format: uuid }
        name: { type: string }
        prompt: { type: string }
        negativePrompt: { type: string, nullable: true }
        coverImage: { type: string, nullable: true }
        coverImageThumbnail: { type: string, nullable: true, description: "~320x400 WebP browsing thumbnail. Null until the backfill/upload pipeline has generated one." }
        creditCost: { type: integer, minimum: 0 }
        minImages: { type: integer, minimum: 1, default: 1 }
        maxImages: { type: integer, minimum: 1, maximum: 5, default: 1 }
        isTrending: { type: boolean }
        isPremium: { type: boolean }
        isEnabled: { type: boolean }
        sortOrder: { type: integer }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        tagIds:
          type: array
          items: { type: string, format: uuid }
          description: Admin-only. Curated tag ids assigned to this style, used by RecommendationService.
        tagsAutoAssigned:
          type: boolean
          description: Admin-only. True if tagIds was last set by autoTagService rather than a manual dashboard edit - controls whether a future save re-runs classification or preserves a manual override.
        fields:
          type: array
          description: >
            Dynamic input fields backing the prompt's {{placeholder}} tokens.
            Empty for classic styles. Returned on both admin and public reads
            (the field definitions are safe to expose; the prompt is not).
          items: { $ref: '#/components/schemas/StyleField' }
      required: [id, categoryId, name, prompt, negativePrompt, coverImage, creditCost, isTrending, isPremium, isEnabled, sortOrder]

    StyleField:
      type: object
      description: One dynamic input field for a style's prompt template.
      properties:
        key:
          type: string
          description: Placeholder key referenced as {{key}} in the prompt (lower_snake_case).
        label: { type: string }
        type:
          type: string
          enum: [text, textarea, number, dropdown, checkbox, color, date]
          description: Control type. New types may be added without breaking older clients.
        required: { type: boolean }
        placeholder: { type: string, nullable: true }
        options:
          type: array
          nullable: true
          description: For dropdown fields.
          items:
            type: object
            properties:
              value: { type: string }
              label: { type: string }
            required: [value, label]
        config:
          type: object
          additionalProperties: true
          description: Extensible per-type knobs (e.g. min, max, maxLength, default, trueText).
        sortOrder: { type: integer }
      required: [key, label, type, required]

    Tag:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        slug: { type: string }
        isEnabled: { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required: [id, name, slug, isEnabled]

    WalletInfo:
      type: object
      properties:
        balance: { type: integer }
        adsProgress: { type: integer }
        generatedImages: { type: integer }
        dailyLimitReached: { type: boolean }
      required: [balance, adsProgress, generatedImages, dailyLimitReached]

    WalletTransaction:
      type: object
      properties:
        id: { type: string, format: uuid }
        userId: { type: string, format: uuid }
        amount: { type: integer }
        type: { type: string, enum: [reward, purchase, generation, refund, admin] }
        description: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
      required: [id, userId, amount, type, description, createdAt]

    RewardResult:
      type: object
      description: Shape varies by branch - dailyLimitReached is only present when the daily free-credit limit was already hit.
      properties:
        rewarded: { type: boolean }
        dailyLimitReached: { type: boolean }
        message: { type: string }
        balance: { type: integer }
        adsProgress: { type: integer }
      required: [rewarded]

    AdminStats:
      type: object
      properties:
        totalUsers: { type: integer }
        activeToday:
          type: integer
          description: Approximation - users with any wallet activity today, not literal login sessions.
        imagesGenerated: { type: integer }
        creditsUsed: { type: integer }
        storageUsedMB: { type: number }
        chartData:
          type: array
          items:
            type: object
            properties:
              label: { type: string }
              value: { type: integer }
            required: [label, value]
        recentActivity:
          type: array
          items:
            type: object
            properties:
              id: { type: string, format: uuid }
              userEmail: { type: string, format: email }
              type: { type: string, enum: [reward, purchase, generation, refund, admin] }
              amount: { type: integer }
              date: { type: string, format: date-time }
            required: [id, userEmail, type, amount, date]
      required: [totalUsers, activeToday, imagesGenerated, creditsUsed, storageUsedMB, chartData, recentActivity]

    CountryStat:
      type: object
      properties:
        countryCode: { type: string, description: "ISO 3166-1 alpha-2 code, e.g. US" }
        countryName: { type: string }
        userCount: { type: integer }
        percentage:
          type: number
          description: Percentage of users (within the selected range) that have this country, rounded to 2 decimals.
      required: [countryCode, countryName, userCount, percentage]

    UsersByCountryStats:
      type: object
      properties:
        range: { type: string, enum: [today, last7days, last30days, allTime] }
        countries:
          type: array
          items: { $ref: '#/components/schemas/CountryStat' }
      required: [range, countries]

    UploadResult:
      type: object
      properties:
        url: { type: string, format: uri }
        thumbnailUrl:
          type: string
          format: uri
          nullable: true
          description: "~320x400 WebP browsing thumbnail. Null only if thumbnail generation failed - the original upload above still succeeded."
      required: [url, thumbnailUrl]

    GenerateResult:
      type: object
      properties:
        success: { type: boolean }
        generatedImageUrl: { type: string, format: uri }
        thumbnailUrl: { type: string, format: uri, nullable: true }
        generationId:
          type: string
          format: uuid
          nullable: true
          description: "The creations row id for this generation, if the best-effort history write succeeded. Round-trip this back on POST /api/feedback."
        categoryId:
          type: string
          format: uuid
          nullable: true
          description: The generated style's category id, for round-tripping on POST /api/feedback.
        generationTimeMs:
          type: integer
          nullable: true
          description: Server-side AI provider call duration, for round-tripping on POST /api/feedback.
      required: [success, generatedImageUrl, thumbnailUrl]

    GenerationFeedbackSubmission:
      type: object
      description: Post-generation feedback. Never includes image data - only ids/metrics/text.
      properties:
        rating: { type: integer, minimum: 1, maximum: 5 }
        comment: { type: string, maxLength: 2000, nullable: true }
        generationId: { type: string, format: uuid, nullable: true }
        styleId: { type: string, format: uuid, nullable: true }
        categoryId: { type: string, format: uuid, nullable: true }
        generationTimeMs: { type: integer, nullable: true }
        appVersion: { type: string, maxLength: 32, nullable: true }
      required: [rating]

    GenerationFeedbackResult:
      type: object
      properties:
        id: { type: string, format: uuid }
        createdAt: { type: string, format: date-time }
      required: [id, createdAt]

    GenerationOverviewStats:
      type: object
      properties:
        totalGenerations: { type: integer }
        todayGenerations: { type: integer }
        thisWeekGenerations: { type: integer }
        thisMonthGenerations: { type: integer }
        activeUsersToday: { type: integer }
        activeUsersThisMonth: { type: integer }
      required: [totalGenerations, todayGenerations, thisWeekGenerations, thisMonthGenerations, activeUsersToday, activeUsersThisMonth]

    StyleUsageStat:
      type: object
      properties:
        styleId: { type: string, format: uuid, nullable: true }
        styleName: { type: string }
        count: { type: integer }
        percentage: { type: number }
      required: [styleName, count, percentage]

    CategoryUsageStat:
      type: object
      properties:
        categoryId: { type: string, format: uuid, nullable: true }
        categoryName: { type: string }
        count: { type: integer }
        percentage: { type: number }
      required: [categoryName, count, percentage]

    StyleRatingStat:
      type: object
      properties:
        styleId: { type: string, format: uuid, nullable: true }
        styleName: { type: string }
        avgRating: { type: number }
        feedbackCount: { type: integer }
      required: [styleName, avgRating, feedbackCount]

    StyleGenerationTimeStat:
      type: object
      nullable: true
      properties:
        styleId: { type: string, format: uuid, nullable: true }
        styleName: { type: string }
        avgMs: { type: integer }
      required: [styleName, avgMs]

    GenerationTimeStats:
      type: object
      properties:
        avgMs: { type: integer, nullable: true }
        sampleCount: { type: integer }
        fastestStyle: { $ref: '#/components/schemas/StyleGenerationTimeStat' }
        slowestStyle: { $ref: '#/components/schemas/StyleGenerationTimeStat' }
      required: [avgMs, sampleCount, fastestStyle, slowestStyle]

    FeedbackSummaryStats:
      type: object
      properties:
        avgRating: { type: number, nullable: true }
        totalFeedback: { type: integer }
        distribution:
          type: object
          description: Count of feedback entries per star rating (keys "1".."5").
          properties:
            "5": { type: integer }
            "4": { type: integer }
            "3": { type: integer }
            "2": { type: integer }
            "1": { type: integer }
      required: [avgRating, totalFeedback, distribution]

    RecentFeedbackEntry:
      type: object
      properties:
        id: { type: string, format: uuid }
        userEmail: { type: string, format: email }
        styleName: { type: string }
        rating: { type: integer }
        comment: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
      required: [id, userEmail, styleName, rating, comment, createdAt]

    GenerationAnalyticsSummary:
      type: object
      properties:
        range: { type: string, enum: [today, last7days, last30days, allTime] }
        minFeedbackCount: { type: integer }
        topStyles: { type: array, items: { $ref: '#/components/schemas/StyleUsageStat' } }
        topCategories: { type: array, items: { $ref: '#/components/schemas/CategoryUsageStat' } }
        highestRatedStyles: { type: array, items: { $ref: '#/components/schemas/StyleRatingStat' } }
        lowestRatedStyles: { type: array, items: { $ref: '#/components/schemas/StyleRatingStat' } }
        generationTime: { $ref: '#/components/schemas/GenerationTimeStats' }
        feedbackSummary: { $ref: '#/components/schemas/FeedbackSummaryStats' }
        recentFeedback: { type: array, items: { $ref: '#/components/schemas/RecentFeedbackEntry' } }
      required: [range, minFeedbackCount, topStyles, topCategories, highestRatedStyles, lowestRatedStyles, generationTime, feedbackSummary, recentFeedback]

    AiGenerateResult:
      type: object
      properties:
        success: { type: boolean }
        imageUrl: { type: string, format: uri }
        thumbnailUrl: { type: string, format: uri, nullable: true }
      required: [success, imageUrl, thumbnailUrl]

    AdminUserSearchResult:
      type: object
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        fullName: { type: string, nullable: true }
        balance: { type: integer }
      required: [id, email, fullName, balance]

    CreditPack:
      type: object
      description: >
        Roadmap Item 4.3. productId is intentionally nullable - no real
        RevenueCat/App Store/Google Play products exist yet (Item 4.1, not
        started). It must not be treated as a real product identifier until
        that item actually configures one.
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        credits: { type: integer, minimum: 1 }
        priceDisplay: { type: string, example: "$4.99" }
        badge: { type: string, nullable: true }
        description: { type: string, nullable: true }
        isEnabled: { type: boolean }
        sortOrder: { type: integer }
        productId: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required: [id, name, credits, priceDisplay, isEnabled, sortOrder, productId]

paths:
  /api/auth/register:
    post:
      summary: Register a new user (email/password), sends a verification email.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string, format: email }
                password: { type: string, minLength: 6 }
                fullName: { type: string }
              required: [email, password, fullName]
      responses:
        '201': { description: Registered, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorMessage' } } } }
        '400': { description: Validation error or email already registered, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorMessage' } } } }
        '500': { description: Server error, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorMessage' } } } }

  /api/auth/verify:
    get:
      summary: Email verification link target. Renders an HTML confirmation page, not JSON.
      security: []
      parameters:
        - name: token
          in: query
          required: true
          schema: { type: string }
      responses:
        '200': { description: HTML verification result page, content: { text/html: {} } }
        '400': { description: HTML error page (missing/invalid/expired token), content: { text/html: {} } }

  /api/auth/login:
    post:
      summary: Email/password login.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string, format: email }
                password: { type: string }
              required: [email, password]
      responses:
        '200': { description: Login success, content: { application/json: { schema: { $ref: '#/components/schemas/UserAuthResponse' } } } }
        '401': { description: Invalid credentials, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorMessage' } } } }
        '403': { description: Email not verified, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorMessage' } } } }

  /api/auth/refresh:
    post:
      summary: Exchange a refresh token for a new access+refresh token pair. Rate-limited (Roadmap Item 2.3).
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken: { type: string }
              required: [refreshToken]
      responses:
        '200':
          description: New token pair
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken: { type: string }
                  refreshToken: { type: string }
                required: [accessToken, refreshToken]
        '401': { description: Invalid or expired refresh token, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorMessage' } } } }

  /api/auth/google:
    post:
      summary: Google Sign-In via server-verified ID token.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                idToken: { type: string }
              required: [idToken]
      responses:
        '200': { description: Sign-in success, content: { application/json: { schema: { $ref: '#/components/schemas/UserAuthResponse' } } } }
        '401': { description: Invalid Google ID token, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorMessage' } } } }

  /api/auth/change-password:
    post:
      summary: Change the authenticated user's password.
      security: [{ userBearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                currentPassword: { type: string }
                newPassword: { type: string, minLength: 8 }
              required: [currentPassword, newPassword]
      responses:
        '200': { description: Password changed, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorMessage' } } } }
        '400': { description: Validation error / wrong current password / Google account, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorMessage' } } } }

  /api/auth/forgot-password:
    post:
      summary: >
        Request a password reset link. Always returns the same generic
        response regardless of whether the account exists (Roadmap Item 2.2).
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string, format: email }
              required: [email]
      responses:
        '200': { description: Generic response, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorMessage' } } } }

  /api/auth/status:
    get:
      summary: >
        Poll email verification status. Returns {verified: false} for a
        nonexistent account rather than a distinct 404 (Roadmap Item 2.2).
        Rate-limited (Roadmap Item 2.3).
      security: []
      parameters:
        - name: email
          in: query
          required: true
          schema: { type: string, format: email }
      responses:
        '200':
          description: Verification status
          content:
            application/json:
              schema:
                type: object
                properties:
                  verified: { type: boolean }
                required: [verified]
        '400': { description: Missing email param, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorMessage' } } } }

  /api/auth/resend-verification:
    post:
      summary: >
        Resend the verification email. Always returns the same generic
        response regardless of account existence or verification state
        (Roadmap Item 2.2).
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string, format: email }
              required: [email]
      responses:
        '200': { description: Generic response, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorMessage' } } } }

  /api/auth/reset-password:
    get:
      summary: Renders the password-reset HTML form for a given token.
      security: []
      parameters:
        - name: token
          in: query
          required: true
          schema: { type: string }
      responses:
        '200': { description: HTML form, content: { text/html: {} } }
        '400': { description: HTML error page, content: { text/html: {} } }
    post:
      summary: Submits the password-reset HTML form.
      security: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                token: { type: string }
                password: { type: string, minLength: 8 }
      responses:
        '200': { description: HTML success/error page, content: { text/html: {} } }

  /api/admin/login:
    post:
      summary: Admin login. Rate-limited (max 20/15min, separate from the user authLimiter).
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string, format: email }
                password: { type: string }
              required: [email, password]
      responses:
        '200': { description: Login success, content: { application/json: { schema: { $ref: '#/components/schemas/AdminAuthResponse' } } } }
        '401': { description: Invalid credentials, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorMessage' } } } }

  /api/admin/stats:
    get:
      summary: Analytics MVP stats for the dashboard (Roadmap Phase 5.9 / Dashboard Functional Plan Part 2).
      security: [{ adminBearerAuth: [] }]
      responses:
        '200': { description: Stats, content: { application/json: { schema: { $ref: '#/components/schemas/AdminStats' } } } }
        '401': { description: Missing/invalid admin token, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorMessage' } } } }

  /api/admin/stats/countries:
    get:
      summary: Users-by-country breakdown, aggregated from public.users.country_code/country_name (Users by Country analytics).
      security: [{ adminBearerAuth: [] }]
      parameters:
        - name: range
          in: query
          required: false
          description: Defaults to allTime. Filters on users.created_at.
          schema: { type: string, enum: [today, last7days, last30days, allTime], default: allTime }
      responses:
        '200': { description: Country breakdown, content: { application/json: { schema: { $ref: '#/components/schemas/UsersByCountryStats' } } } }
        '400': { description: Invalid range param, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorMessage' } } } }
        '401': { description: Missing/invalid admin token, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorMessage' } } } }

  /api/admin/analytics/generation/overview:
    get:
      summary: Fixed-window generation overview counters (Total/Today/This Week/This Month generations, Active Users Today/This Month) for the dashboard's Generation Analytics page.
      security: [{ adminBearerAuth: [] }]
      responses:
        '200': { description: Overview stats, content: { application/json: { schema: { $ref: '#/components/schemas/GenerationOverviewStats' } } } }
        '401': { description: Missing/invalid admin token, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorMessage' } } } }

  /api/admin/analytics/generation/summary:
    get:
      summary: Range-filtered generation analytics (top styles/categories, highest/lowest rated styles, average generation time, feedback summary, recent feedback), all aggregated in SQL.
      security: [{ adminBearerAuth: [] }]
      parameters:
        - name: range
          in: query
          required: false
          description: Defaults to allTime. Filters on generation_events.created_at / generation_feedback.created_at.
          schema: { type: string, enum: [today, last7days, last30days, allTime], default: allTime }
        - name: minFeedbackCount
          in: query
          required: false
          description: Minimum feedback count for a style to appear in highestRatedStyles/lowestRatedStyles. Defaults to 10.
          schema: { type: integer, minimum: 1, default: 10 }
      responses:
        '200': { description: Generation analytics summary, content: { application/json: { schema: { $ref: '#/components/schemas/GenerationAnalyticsSummary' } } } }
        '400': { description: Invalid range param, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorMessage' } } } }
        '401': { description: Missing/invalid admin token, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorMessage' } } } }

  /api/admin/users/search:
    get:
      summary: Look up a single user by email (Roadmap Item 3.4 - manual credit adjustment tool).
      security: [{ adminBearerAuth: [] }]
      parameters:
        - name: email
          in: query
          required: true
          schema: { type: string, format: email }
      responses:
        '200': { description: User found, content: { application/json: { schema: { $ref: '#/components/schemas/AdminUserSearchResult' } } } }
        '400': { description: Missing email param, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorMessage' } } } }
        '404': { description: No user with this email, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorMessage' } } } }

  /api/admin/users/{id}/adjust-balance:
    post:
      summary: >
        Manually adds (positive amount) or deducts (negative amount) credits
        for a user, recorded as a type="admin" ledger entry (Roadmap Item
        3.4). Deducting more than the user's balance fails with 400 rather
        than going negative.
      security: [{ adminBearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                amount: { type: integer, description: "Non-zero; positive adds, negative deducts." }
                description: { type: string, description: "Reason for the adjustment, required." }
              required: [amount, description]
      responses:
        '200':
          description: Adjusted
          content:
            application/json:
              schema:
                type: object
                properties:
                  balance: { type: integer }
                required: [balance]
        '400': { description: Validation error or insufficient balance for a deduction, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorMessage' } } } }
        '404': { description: User not found, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorMessage' } } } }

  /api/admin/ai/generate-preview:
    post:
      summary: >
        Admin Dashboard "Test Prompt" tool. Reuses the same Stability AI
        generation as /api/ai/generate, but charges no wallet and writes no
        creation-history row - it's a testing aid, not a real user generation.
      security: [{ adminBearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                prompt: { type: string }
                negativePrompt: { type: string }
                aspectRatio: { type: string, example: "16:9" }
                style: { type: string, example: "photographic" }
              required: [prompt]
      responses:
        '200': { description: Generated, content: { application/json: { schema: { $ref: '#/components/schemas/AiGenerateResult' } } } }
        '400': { description: Validation error, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorMessage' } } } }
        '429': { description: Rate limited by Stability AI, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorMessage' } } } }
        '503': { description: Stability AI unavailable, misconfigured, or out of credits, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorMessage' } } } }

  /api/categories:
    get:
      summary: List all categories.
      security: []
      responses:
        '200':
          description: Category list
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/Category' } }
    post:
      summary: Create a category.
      security: [{ adminBearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                isEnabled: { type: boolean, default: true }
              required: [name]
      responses:
        '201': { description: Created, content: { application/json: { schema: { $ref: '#/components/schemas/Category' } } } }
        '400': { description: Validation error, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorMessage' } } } }
        '409': { description: Duplicate name, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorMessage' } } } }

  /api/categories/reorder:
    put:
      summary: Bulk-update category sort order.
      security: [{ adminBearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                categories:
                  type: array
                  items:
                    type: object
                    properties:
                      id: { type: string, format: uuid }
                      sortOrder: { type: integer }
              required: [categories]
      responses:
        '200': { description: Reordered, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorMessage' } } } }
        '400': { description: Validation error, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorMessage' } } } }

  /api/categories/{id}:
    put:
      summary: Update a category.
      security: [{ adminBearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                isEnabled: { type: boolean }
                sortOrder: { type: integer }
              required: [name]
      responses:
        '200': { description: Updated, content: { application/json: { schema: { $ref: '#/components/schemas/Category' } } } }
        '404': { description: Not found, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorMessage' } } } }
        '409': { description: Duplicate name, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorMessage' } } } }
    delete:
      summary: Delete a category (fails if it still contains styles).
      security: [{ adminBearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204': { description: Deleted }
        '404': { description: Not found, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorMessage' } } } }
        '409': { description: Category still has styles, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorMessage' } } } }

  /api/styles/prompt-preview:
    post:
      summary: >
        Admin-only live prompt preview. Renders the final prompt from a prompt +
        field definitions + sample values using the same engine as generation,
        so the dashboard preview matches production exactly. Never exposed to
        non-admins.
      security: [{ adminBearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                prompt: { type: string }
                fields:
                  type: array
                  items: { $ref: '#/components/schemas/StyleField' }
                values:
                  type: object
                  additionalProperties: true
              required: [prompt]
      responses:
        '200':
          description: Rendered prompt
          content:
            application/json:
              schema:
                type: object
                properties:
                  prompt: { type: string }
        '400': { description: Validation error, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorMessage' } } } }
        '401': { description: Unauthorized }

  /api/styles:
    get:
      summary: >
        List styles. Defaults to enabled-only unless all=true (used by the
        admin dashboard). recommended=true returns the personalized "Recommended
        For You" feed instead (requires userBearerAuth; returns [] if the
        caller is anonymous, personalization is off, or there's no favorite/creation
        history yet - see RecommendationService).
      security: [{ userBearerAuth: [] }, {}]
      parameters:
        - name: categoryId
          in: query
          required: false
          schema: { type: string, format: uuid }
        - name: all
          in: query
          required: false
          schema: { type: string, enum: ["true"] }
        - name: trending
          in: query
          required: false
          schema: { type: string, enum: ["true"] }
        - name: recommended
          in: query
          required: false
          schema: { type: string, enum: ["true"] }
      responses:
        '200':
          description: Style list
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/Style' } }
    post:
      summary: Create a style.
      security: [{ adminBearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                categoryId: { type: string, format: uuid }
                name: { type: string }
                prompt: { type: string }
                negativePrompt: { type: string, nullable: true }
                coverImage: { type: string, nullable: true }
                coverImageThumbnail: { type: string, nullable: true }
                creditCost: { type: integer, minimum: 0, default: 1 }
                minImages: { type: integer, minimum: 1, default: 1 }
                maxImages: { type: integer, minimum: 1, maximum: 5, default: 1 }
                isTrending: { type: boolean, default: false }
                isPremium: { type: boolean, default: false }
                isEnabled: { type: boolean, default: true }
                sortOrder: { type: integer }
                tagIds:
                  type: array
                  items: { type: string, format: uuid }
                  default: []
                  description: Ignored unless autoAssignTags is explicitly false.
                autoAssignTags:
                  type: boolean
                  default: true
                  description: When true (default), tagIds is computed by autoTagService from name/prompt/category and any client-sent tagIds is ignored. Set false to use tagIds as a manual override.
                fields:
                  type: array
                  description: Dynamic input field definitions. Replaces the style's full field set. Omit to leave unchanged.
                  items: { $ref: '#/components/schemas/StyleField' }
              required: [categoryId, name, prompt]
      responses:
        '201': { description: Created, content: { application/json: { schema: { $ref: '#/components/schemas/Style' } } } }
        '400': { description: Validation error, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorMessage' } } } }
        '409': { description: Duplicate name in category, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorMessage' } } } }

  /api/styles/{id}/similar:
    get:
      summary: "\"You may also like\" - styles similar to the given anchor style, ranked by RecommendationService. Anonymous-safe: no auth required, and not gated by the personalization setting since it's style-to-style, not user history."
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: limit
          in: query
          required: false
          schema: { type: integer, default: 10 }
      responses:
        '200':
          description: Similar styles
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/Style' } }
        '404': { description: Style not found or disabled, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorMessage' } } } }

  /api/styles/reorder:
    put:
      summary: Bulk-update style sort order.
      security: [{ adminBearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                styles:
                  type: array
                  items:
                    type: object
                    properties:
                      id: { type: string, format: uuid }
                      sortOrder: { type: integer }
              required: [styles]
      responses:
        '200': { description: Reordered, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorMessage' } } } }
        '400': { description: Validation error, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorMessage' } } } }

  /api/styles/{id}:
    put:
      summary: Update a style.
      security: [{ adminBearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                categoryId: { type: string, format: uuid }
                name: { type: string }
                prompt: { type: string }
                negativePrompt: { type: string, nullable: true }
                coverImage: { type: string, nullable: true }
                coverImageThumbnail: { type: string, nullable: true }
                creditCost: { type: integer, minimum: 0 }
                minImages: { type: integer, minimum: 1, default: 1 }
                maxImages: { type: integer, minimum: 1, maximum: 5, default: 1 }
                isTrending: { type: boolean }
                isPremium: { type: boolean }
                isEnabled: { type: boolean }
                sortOrder: { type: integer }
                tagIds:
                  type: array
                  items: { type: string, format: uuid }
                  description: Used verbatim only when autoAssignTags is false; otherwise ignored.
                autoAssignTags:
                  type: boolean
                  description: Omit to leave existing tags untouched (e.g. quick isTrending/isPremium/isEnabled toggles). true re-runs autoTagService using this request's name/prompt/category; false stores tagIds as a manual override.
              required: [categoryId, name, prompt]
      responses:
        '200': { description: Updated, content: { application/json: { schema: { $ref: '#/components/schemas/Style' } } } }
        '404': { description: Not found, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorMessage' } } } }
        '409': { description: Duplicate name in category, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorMessage' } } } }
    patch:
      summary: >
        Partially update a style's quick-toggle flags (Trending /
        Enable-Disable). Unlike PUT, no full payload is required and no other
        field is touched. At least one of isTrending/isEnabled must be sent.
      security: [{ adminBearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                isTrending: { type: boolean }
                isEnabled: { type: boolean }
              minProperties: 1
      responses:
        '200': { description: Updated, content: { application/json: { schema: { $ref: '#/components/schemas/Style' } } } }
        '400': { description: Validation error, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorMessage' } } } }
        '404': { description: Not found, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorMessage' } } } }
    delete:
      summary: Delete a style.
      security: [{ adminBearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204': { description: Deleted }
        '404': { description: Not found, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorMessage' } } } }

  /api/tags:
    get:
      summary: List all tags. Admin-only - tags are internal ranking metadata, never listed for the mobile app.
      security: [{ adminBearerAuth: [] }]
      responses:
        '200':
          description: Tag list
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/Tag' } }
    post:
      summary: Create a tag.
      security: [{ adminBearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                isEnabled: { type: boolean, default: true }
              required: [name]
      responses:
        '201': { description: Created, content: { application/json: { schema: { $ref: '#/components/schemas/Tag' } } } }
        '400': { description: Validation error, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorMessage' } } } }
        '409': { description: Duplicate tag name, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorMessage' } } } }

  /api/tags/{id}:
    put:
      summary: Update a tag.
      security: [{ adminBearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                isEnabled: { type: boolean }
              required: [name]
      responses:
        '200': { description: Updated, content: { application/json: { schema: { $ref: '#/components/schemas/Tag' } } } }
        '404': { description: Not found, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorMessage' } } } }
        '409': { description: Duplicate tag name, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorMessage' } } } }
    delete:
      summary: Delete a tag.
      security: [{ adminBearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204': { description: Deleted }
        '404': { description: Not found, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorMessage' } } } }

  /api/upload:
    post:
      summary: Upload a cover image to Supabase Storage.
      security: [{ adminBearerAuth: [] }]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file: { type: string, format: binary }
              required: [file]
      responses:
        '200': { description: Uploaded, content: { application/json: { schema: { $ref: '#/components/schemas/UploadResult' } } } }
        '400': { description: No file / invalid type, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorMessage' } } } }
    delete:
      summary: Delete a previously-uploaded cover image by its public URL.
      security: [{ adminBearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                url: { type: string, format: uri }
              required: [url]
      responses:
        '204': { description: Deleted }
        '400': { description: Missing/invalid URL, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorMessage' } } } }

  /api/generate:
    post:
      summary: Generate a styled image. Charges credits atomically before calling the AI provider, refunds on failure.
      security: [{ userBearerAuth: [] }]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file: { type: string, format: binary }
                styleId: { type: string, format: uuid }
              required: [file, styleId]
      responses:
        '200': { description: Generated, content: { application/json: { schema: { $ref: '#/components/schemas/GenerateResult' } } } }
        '400': { description: Validation error / style disabled, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorCode' } } } }
        '403': { description: Insufficient balance, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorCode' } } } }
        '404': { description: Style not found, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorCode' } } } }
        '503': { description: AI provider temporarily unavailable, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorCode' } } } }

  /api/feedback:
    post:
      summary: Submits post-generation feedback (star rating + optional comment). Never accepts image data.
      security: [{ userBearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/GenerationFeedbackSubmission' }
      responses:
        '201': { description: Feedback recorded, content: { application/json: { schema: { $ref: '#/components/schemas/GenerationFeedbackResult' } } } }
        '400': { description: Validation error, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorCode' } } } }
        '401': { description: Missing/invalid user token, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorCode' } } } }

  /api/ai/generate:
    post:
      summary: >
        Generate an image (WebP) from a text prompt via Stability AI. Charges
        credits atomically before calling the AI provider, refunds on failure
        - same flow as /api/generate. Fully independent of /api/generate
        (style-transfer) and the internal auto-tagging service otherwise -
        separate service/controller/route, no shared state. At least one of
        prompt/styleId is required - GET /api/styles never exposes a style's
        prompt text to the client, so styleId lets the caller ask for a
        style's prompt to be resolved server-side instead of supplying it
        directly (mirrors /api/generate's own server-side resolution).
      security: [{ userBearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                prompt: { type: string, description: "Raw prompt text. Omit and send styleId instead to have the server resolve it." }
                styleId: { type: string, format: uuid, description: "Resolves prompt/negativePrompt server-side when prompt is omitted." }
                negativePrompt: { type: string }
                aspectRatio: { type: string, example: "16:9" }
                style: { type: string, example: "photographic" }
      responses:
        '200': { description: Generated, content: { application/json: { schema: { $ref: '#/components/schemas/AiGenerateResult' } } } }
        '400': { description: Validation error, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorCode' } } } }
        '403': { description: Insufficient balance, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorCode' } } } }
        '429': { description: Rate limited by Stability AI, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorCode' } } } }
        '503': { description: Stability AI unavailable, misconfigured, or out of credits, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorCode' } } } }

  /api/wallet:
    get:
      summary: Get the authenticated user's wallet info.
      security: [{ userBearerAuth: [] }]
      responses:
        '200': { description: Wallet info, content: { application/json: { schema: { $ref: '#/components/schemas/WalletInfo' } } } }

  /api/wallet/history:
    get:
      summary: Get the authenticated user's transaction history, newest first.
      security: [{ userBearerAuth: [] }]
      responses:
        '200':
          description: Transaction history
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/WalletTransaction' } }

  /api/wallet/reward:
    post:
      summary: Grant a reward after watching 2 rewarded ads (client-reported, not SSV-verified).
      security: [{ userBearerAuth: [] }]
      responses:
        '200': { description: Reward result, content: { application/json: { schema: { $ref: '#/components/schemas/RewardResult' } } } }

  /api/wallet/reward/verify:
    post:
      summary: >
        AdMob Server-Side Verification callback. Public, no auth - protected by
        mandatory signature verification instead (Roadmap Item 1.3).
      security: []
      responses:
        '200':
          description: Reward verified/processed, or a duplicate transaction acknowledged
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  message: { type: string }
                  rewardResult: { $ref: '#/components/schemas/RewardResult' }
                required: [message]
        '400': { description: Missing params / invalid signature, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorCode' } } } }

  /api/credit-packs:
    get:
      summary: List credit packs. Defaults to enabled-only unless all=true (used by the admin dashboard).
      security: []
      parameters:
        - name: all
          in: query
          required: false
          schema: { type: string, enum: ["true"] }
      responses:
        '200':
          description: Credit pack list
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/CreditPack' } }
    post:
      summary: Create a credit pack.
      security: [{ adminBearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                credits: { type: integer, minimum: 1 }
                priceDisplay: { type: string }
                badge: { type: string, nullable: true }
                description: { type: string, nullable: true }
                isEnabled: { type: boolean, default: true }
                sortOrder: { type: integer }
              required: [name, credits, priceDisplay]
      responses:
        '201': { description: Created, content: { application/json: { schema: { $ref: '#/components/schemas/CreditPack' } } } }
        '400': { description: Validation error, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorMessage' } } } }
        '409': { description: Duplicate name, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorMessage' } } } }

  /api/credit-packs/{id}:
    put:
      summary: Update a credit pack.
      security: [{ adminBearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                credits: { type: integer, minimum: 1 }
                priceDisplay: { type: string }
                badge: { type: string, nullable: true }
                description: { type: string, nullable: true }
                isEnabled: { type: boolean }
                sortOrder: { type: integer }
              required: [name, credits, priceDisplay]
      responses:
